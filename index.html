<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zodiac Music Player</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Stars */
    #stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: blink 2s infinite ease-in-out alternate;
    }

    @keyframes blink {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.5); }
    }

    /* Loader Screen */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #090a0f;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #loader.hide {
      opacity: 0;
      visibility: hidden;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #a29bfe;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      max-width: 90%;
      width: 400px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
      color: #e0e0e0;
    }

    p {
      color: #a0a0a0;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    /* Music Control Button */
    .music-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border: none;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
      transition: all 0.3s ease;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      outline: none;
    }

    .music-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6);
    }

    .music-btn.playing {
      animation: pulse 2s infinite ease-in-out;
      background: linear-gradient(135deg, #ff7675, #d63031);
      box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.7); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(214, 48, 49, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
    }

    .status-text {
      margin-top: 15px;
      font-size: 0.85rem;
      color: #81ecec;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loader">
    <div class="spinner"></div>
    <p>กำลังโหลดประสบการณ์ของคุณ...</p>
  </div>

  <!-- Starry Background -->
  <div id="stars"></div>

  <!-- Main Player Box -->
  <div class="container">
    <h1>REN - MURDERER</h1>
    <p>แตะตรงไหนก็ได้บนหน้าจอ หรือกดปุ่มด้านล่างเพื่อเปิด/ปิดเพลง</p>
    
    <button id="musicBtn" class="music-btn" onclick="toggleMusic()" aria-label="Toggle Music">
      <span id="musicIcon">🎵</span>
    </button>

    <div id="statusText" class="status-text">พร้อมเล่นเพลง</div>
  </div>

  <!-- Audio Element (ใส่ชื่อไฟล์ MP3 ของคุณตรงนี้) -->
  <audio id="bgMusic" loop preload="auto">
    <source src="Ren - Murderer Official Music Video (1) (1).mp3" type="audio/mpeg">
    เบราว์เซอร์ของคุณไม่รองรับการเล่นไฟล์เสียง
  </audio>

  <script>
    // 1. สร้างดาวบนพื้นหลังแบบสุ่ม
    const starBox = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.transform = `scale(${Math.random() * 1.5 + 0.5})`;
      starBox.appendChild(s);
    }

    // 2. จัดการตัวแปรและสถานะเพลง
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    const musicIcon = document.getElementById('musicIcon');
    const statusText = document.getElementById('statusText');
    let isPlaying = false;

    // ฟังก์ชันเปิด/ปิดเพลงผ่านปุ่ม
    function toggleMusic() {
      if (isPlaying) {
        music.pause();
        musicBtn.classList.remove('playing');
        musicIcon.textContent = '🎵';
        statusText.textContent = 'หยุดเพลงแล้ว';
        isPlaying = false;
      } else {
        startPlay();
      }
    }

    // ฟังก์ชันสั่งเล่นเพลงอย่างปลอดภัย
    function startPlay() {
      music.volume = 0.6;
      music.play().then(() => {
        isPlaying = true;
        musicBtn.classList.add('playing');
        musicIcon.textContent = '🔇';
        statusText.textContent = 'กำลังเล่นเพลง 🎶';
      }).catch(err => {
        console.log('Autoplay blocked:', err);
        statusText.textContent = 'แตะหน้าจอเพื่อเริ่มเล่นเพลง';
      });
    }

    // 3. ซ่อน Loader เมื่อโหลดเสร็จ (3 วินาที)
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('loader');
        if (loader) loader.classList.add('hide');
        startPlay(); // พยายามเล่นเพลงทันที
      }, 3000);
    });

    // 4. แก้ปัญหา Autoplay Policy ของเบราว์เซอร์ (ปลดล็อกเมื่อสัมผัส/คลิกหน้าจอครั้งแรก)
    const unlockAudio = () => {
      if (!isPlaying) {
        startPlay();
      }
      // ลบ Event Listener เมื่อปลดล็อกเรียบร้อยแล้ว
      ['click', 'touchstart', 'keydown'].forEach(evt => {
        document.removeEventListener(evt, unlockAudio);
      });
    };

    ['click', 'touchstart', 'keydown'].forEach(evt => {
      document.addEventListener(evt, unlockAudio, { once: true });
    });
  </script>
</body>
</html>
